# coturn config — TURN/STUN server for WebRTC NAT traversal
# Docs: https://github.com/coturn/coturn/wiki/turnserver

# Listening ports
listening-port=3478
tls-listening-port=5349

# External IP is auto-detected by coturn if not set;
# on NetAngels VPS with single public IP this works.
# external-ip=YOUR_PUBLIC_IP

# Relay UDP port range (must match firewall rules)
min-port=50000
max-port=50200

# Use long-term credentials with a shared secret (TURN REST API mode).
# LiveKit/clients will derive username/password from this secret.
use-auth-secret
static-auth-secret=REPLACE_ME_TURN_SECRET

# Realm (any string, commonly the domain)
realm=livekit.if-x.ru

# TLS (shared with Nginx Let's Encrypt certs)
cert=/certs/live/livekit.if-x.ru/fullchain.pem
pkey=/certs/live/livekit.if-x.ru/privkey.pem

# Reasonable defaults
fingerprint
no-tlsv1
no-tlsv1_1
no-cli
no-multicast-peers
no-stdout-log
log-file=/var/log/turn.log
simple-log
