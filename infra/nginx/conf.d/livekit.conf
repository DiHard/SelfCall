# LiveKit signaling (WebSocket) — proxied over TLS
server {
    listen 443 ssl;
    http2 on;
    server_name livekit.if-x.ru;

    ssl_certificate     /etc/letsencrypt/live/livekit.if-x.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.if-x.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # WebSocket upgrade required for LiveKit signaling
    location / {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
