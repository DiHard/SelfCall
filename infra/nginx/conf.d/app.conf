# React frontend
server {
    listen 443 ssl;
    http2 on;
    server_name app.if-x.ru;

    ssl_certificate     /etc/letsencrypt/live/app.if-x.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.if-x.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets — cache forever (content-addressed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA entry point — always revalidate so new deploys are picked up immediately
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
